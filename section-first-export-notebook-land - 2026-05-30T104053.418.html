    function getExportScaleTarget(wrap) {
      return wrap?.querySelector?.('editor-info-card, editor-menu, editor-form, editor-image, editor-text, editor-button') || null;
    }
    function updateExportScaleToFit(wrap) {
      if (!wrap || wrap.getAttribute('fit') !== 'scale') return;
      const component = getExportScaleTarget(wrap);
      if (!component) return;
      component.style.transform = '';
      component.style.transformOrigin = 'top left';
      component.style.width = '100%';
      component.style.height = 'auto';
      component.style.maxHeight = '';
      requestAnimationFrame(() => {
        if (!wrap.isConnected || wrap.getAttribute('fit') !== 'scale') return;
        const rect = wrap.getBoundingClientRect();
        const availableH = Math.max(1, wrap.clientHeight || rect.height);
        const availableW = Math.max(1, wrap.clientWidth || rect.width);
        const rootChild = component.shadowRoot?.querySelector('article, nav, .wrap, .frame') || component;
        const naturalH = Math.max(1, rootChild.scrollHeight || component.scrollHeight || component.offsetHeight || 1);
        const naturalW = Math.max(1, rootChild.scrollWidth || component.scrollWidth || component.offsetWidth || 1);
        const scale = Math.max(0.1, Math.min(1, availableH / naturalH, availableW / naturalW));
        component.style.transform = 'scale(' + scale + ')';
        component.style.transformOrigin = 'top left';
        component.style.width = (availableW / scale) + 'px';
        component.style.height = (availableH / scale) + 'px';
        component.style.maxHeight = (availableH / scale) + 'px';
      });
    }
